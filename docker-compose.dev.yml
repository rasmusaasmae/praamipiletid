# Local-dev override: publish Electric's port on the host so `bun dev`
# (running outside compose) can reach it at http://localhost:${ELECTRIC_PORT}.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres electric
#   bun dev
services:
  electric:
    ports:
      - '${ELECTRIC_PORT:-3001}:3000'
