services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ferry
      POSTGRES_PASSWORD: ferry
      POSTGRES_DB: ferry
    volumes:
      - ferry_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ferry -d ferry']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ghcr.io/rasmusaasmae/praamipiletid:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      APP_URL: ${APP_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-10000}
      PRAAMID_CRED_KEY: ${PRAAMID_CRED_KEY}
      DATABASE_URL: postgres://ferry:ferry@postgres:5432/ferry
    shm_size: 1gb
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  ferry_pg:
